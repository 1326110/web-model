<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mask Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>Mask Detection System</h1>
        <div id="status">Initializing AI...</div>
        
        <div class="viewport">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="legend">
            <p><span class="box green"></span> Mask Correct</p>
            <p><span class="box red"></span> No Mask</p>
            <p><span class="box yellow"></span> Adjust Mask</p>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
