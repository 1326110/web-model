<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mask Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Mask Detection System</h1>
        <div id="status">Initializing AI...</div>
        
        <div class="video-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="instructions">
            <p><span class="dot green"></span> Green: Mask Detected</p>
            <p><span class="dot red"></span> Red: No Mask</p>
            <p><span class="dot yellow"></span> Yellow: Incorrectly Worn</p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
